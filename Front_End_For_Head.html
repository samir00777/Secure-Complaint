<!DOCTYPE html>
<html>
<head>
  <title>Head Complaint</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Front_End_For_Head.css">
  <script src="Front_End_For_Head.js"></script>
</head>
<body>
  <h2>Head Complaint Form</h2>

  <form action="/head_submit" method="post">
    <input type="number" name="Head_Id" placeholder="Head ID" required><br><br>
    <input type="text" name="Name" placeholder="Name" required><br><br>
    <input type="number" name="Phone_no" placeholder="Phone No" required><br><br>
    <input type="email" name="Email_Id" placeholder="Email" required><br><br>
    <input type="text" name = "password" placeholder="Password" required><br><br>

    <button type="submit">Submit</button>
  </form>

</body>
</html>
