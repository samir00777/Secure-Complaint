<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Complaint Portal</title>
  <link rel="stylesheet" href="Front_End_For_Teacher.css">
  <script src="Front_End_For_Teacher.js"></script>
</head>
<body>

  <div class="container">
    <h2>Teacher Complaint Form</h2>
    <form action="/teacher_submit" method="post">
      <div class="form-group">
        <label for="roll_no">Roll No</label>
        <input type="number" id="roll_no" name="Roll_No" placeholder="Enter your Roll No" required>
      </div>
      <div class="form-group">
        <label for="enrollment_no">Enrollment No</label>
        <input type="number" id="enrollment_no" name="Enrollment_No" placeholder="Enter your Enrollment No" required>
      </div>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="Name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="Email_Id" placeholder="Enter your email address" required>
      </div>
      <div class="form-group">
        <label for="phone_no">Phone No</label>
        <input type="number" id="phone_no" name="Phone_no" placeholder="Enter your phone number" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>
      <button type="submit">Submit Complaint</button>
    </form>
  </div>

</body>
</html>
