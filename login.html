<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BattleBits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="login.js"></script>
</head>
<body>
    <div class="login-card">
        <h2>Sign In</h2>
        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" id="pass" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login" onclick="validatePassword()">Sign In</button>
        </form>
        <div class="text-center mt-4">
            <p class="mb-0">Don't have account? <a href="createAccount.html" class="create-link">Create account</a></p>
        </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    
</body>
</html>
