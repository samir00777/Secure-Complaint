<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root
    {
        --bg-color: #F8F9FA; /* Light background for overall page */
        --card-bg-color: #FDFDFD; /* Slightly off-white background for the card */
        --text-color: #1F2937;
        --text-light: #6B7280;
        --accent-color: #2563EB; /* Accent blue */
        --accent-hover: #1D4ED8; /* Darker blue for hover */
        --border-color: #E5E7EB;
        --shadow-color: 0, 0, 0; /* For subtle shadows */
    }

    @keyframes fadeInSlideUp
    {
        from 
        {
            opacity: 0;
            transform: translateY(10px);
        }
        to 
        {
            opacity: 1;
            transform: translateY(0);
        }
    }

    body 
    {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color); /* Fallback color */
        background-image: url('https://imgs.search.brave.com/P1kPsvCIerz6PN9ZFbinM1j-OGEsG8HWA2JJPLv1Z58/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9zaWdu/LXVwLXBlbi13cml0/aW5nLWlzb2xhdGVk/LXdoaXRlLTQxMzAw/NzI1LmpwZw'); /* New background photo */
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        justify-content: flex-end; /* Reposition to the right */
        align-items: center;
        margin: 0;
        padding-right: 10vw; /* Add padding to the right */
        color: var(--text-color);
        position: relative;
    }

    /* Remove body::before as it's no longer needed for the gradient */
    /* body::before { ... } */

    form
    {
        position: relative;
        z-index: 1;
        margin-right: 0; /* Remove margin-right to center form */
    }

    .box
    {
        background: var(--card-bg-color); /* Slightly off-white background for the card */
        padding: 56px;
        width: 420px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(var(--shadow-color), 0.1); /* Subtle shadow */
        animation: fadeInSlideUp 0.6s ease-out forwards;
    }

    h2
    {
        text-align: center; /* Center the heading */
        font-size: 28px;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 32px;
    }

    input, select 
    {
        width: 100%;
        padding: 12px; 
        margin: 12px 0;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
        border-radius: 8px; 
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        background-color: var(--card-bg-color);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        opacity: 1; 
        animation: none;
    }
    
    /* Remove animation delays from individual elements */
    /* select { animation-delay: 0.1s; } */
    /* #method { animation-delay: 0.2s; } */
    /* #phoneBox input, #emailBox input { animation-delay: 0.3s; } */

    input::placeholder 
    {
        color: var(--text-light);
    }

    input:focus, select:focus 
    {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); /* Accent color shadow */
    }
    
    select 
    {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236B7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.75rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        padding-right: 2em;
    }
    
    select:required:invalid 
    {
        color: var(--text-light);
    }

    button {
        width: 100%;
        background: var(--accent-color);
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
        margin-top: 32px;
        padding: 16px;
        border-radius: 8px;
        transition: background-color 0.2s ease;
        opacity: 1; /* Ensure button is visible */
        animation: none; /* Remove animation from button */
    }

    button:hover 
    {
        background: var(--accent-hover);
    }

    .hidden 
    {
        display: none;
    }
  </style>
</head>
<body>

  <form method="POST" action="/signup">
    <div class="box">
      <h2>Signup</h2>

      <select name="role" id="role" onchange="roleSelected()" required>
        <option value="" disabled selected>Select Role</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="head">Head</option>
      </select>

      <div id="method" class="hidden">
        <select name="method" onchange="methodSelected(this.value)" required>
          <option value="" disabled selected>Signup Using</option>
          <option value="phone">Phone Number</option>
          <option value="email">Email</option>
        </select>
      </div>

      <div id="phoneBox" class="hidden">
        <input type="text" name="phone" placeholder="Phone Number">
        <input type="password" name="password_for_phone" placeholder="Password">
      </div>

      <div id="emailBox" class="hidden">
        <input type="email" name="email" placeholder="Email">
        <input type="password" name="password_for_email" placeholder="Password">
      </div>

      <button type="submit">Sign Up</button>
    </div>
  </form>

  <script>
    function roleSelected() {
      document.getElementById("method").classList.remove("hidden");
    }

    function methodSelected(v) {
      document.getElementById("phoneBox").classList.add("hidden");
      document.getElementById("emailBox").classList.add("hidden");

      if (v === "phone") {
        document.getElementById("phoneBox").classList.remove("hidden");
      } else if (v === "email") {
        document.getElementById("emailBox").classList.remove("hidden");
      }
    }
  </script>

</body>
</html>
