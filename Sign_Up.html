<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="Sign_Up.css">
  <script src="Sign_Up.js"></script>
</head>
<body>

  <form method="POST" action="/signup">
    <div class="box">
      <h2>Signup</h2>

      <select name="role" id="role" onchange="roleSelected()" required>
        <option value="" disabled selected>Select Role</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="head">Head</option>
      </select>

      <div id="method" class="hidden">
        <select name="method" onchange="methodSelected(this.value)" required>
          <option value="" disabled selected>Signup Using</option>
          <option value="phone">Phone Number</option>
          <option value="email">Email</option>
        </select>
      </div>

      <div id="phoneBox" class="hidden">
        <input type="text" name="phone" placeholder="Phone Number">
        <input type="password" name="password_for_phone" placeholder="Password">
      </div>

      <div id="emailBox" class="hidden">
        <input type="email" name="email" placeholder="Email">
        <input type="password" name="password_for_email" placeholder="Password">
      </div>

      <button type="submit">Sign Up</button>
    </div>
  </form>

</body>
</html>
